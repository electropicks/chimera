pre-commit:
  parallel: true
  commands:
    biome-format:
      glob: "**/*.{js,cjs,mjs,jsx,ts,tsx,json,jsonc,css}"
      run: pnpm exec biome format --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      glob: "**/*.{js,cjs,mjs,jsx,ts,tsx}"
      run: pnpm typecheck

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
