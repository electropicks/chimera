<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chimera POC</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #17261d;
        color: #f8faf3;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      #app {
        position: relative;
      }

      #app canvas {
        display: block;
      }

      .chimera-hud {
        position: absolute;
        top: 16px;
        left: 16px;
        width: min(240px, calc(100% - 32px));
        box-sizing: border-box;
        padding: 12px;
        border: 1px solid rgba(183, 217, 156, 0.32);
        border-radius: 8px;
        background: rgba(12, 22, 17, 0.86);
        box-shadow: 0 14px 42px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(10px);
      }

      .hud-row {
        display: grid;
        grid-template-columns: minmax(64px, 1fr) auto;
        gap: 12px;
        align-items: baseline;
        min-height: 22px;
      }

      .hud-label {
        color: rgba(248, 250, 243, 0.68);
        font-size: 12px;
        line-height: 1.4;
      }

      .hud-value {
        color: #f8faf3;
        font-size: 13px;
        font-weight: 650;
        line-height: 1.4;
        text-align: right;
      }

      .hud-bar-row + .hud-bar-row,
      .hud-row + .hud-bar-row,
      .hud-bar-row + .hud-row,
      .hud-row + .hud-row {
        margin-top: 8px;
      }

      .hud-bar {
        width: 100%;
        height: 6px;
        margin-top: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(248, 250, 243, 0.13);
      }

      .hud-bar-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        transition: width 120ms linear;
      }

      .hud-bar-fill.hunger {
        background: #f97316;
      }

      .hud-bar-fill.energy {
        background: #5eead4;
      }
    </style>
  </head>
  <body>
    <div id="app" aria-label="Chimera creature POC"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
